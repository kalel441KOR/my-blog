<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>픽셀 아트 에디터</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>픽셀 아트 에디터</h1>
      <button id="theme-toggle" class="icon-btn" type="button" aria-label="다크모드 전환" title="다크모드 전환">🌙</button>
    </header>

    <div class="toolbar" role="toolbar" aria-label="드로잉 도구">
      <button class="tool-btn active" id="tool-pen" data-tool="pen" type="button" title="펜">✏️ 펜</button>
      <button class="tool-btn" id="tool-eraser" data-tool="eraser" type="button" title="지우개">🧹 지우개</button>
      <button class="tool-btn" id="tool-fill" data-tool="fill" type="button" title="채우기">🪣 채우기</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="pixel-canvas" width="512" height="512" aria-label="16x16 픽셀 캔버스"></canvas>
    </div>

    <div class="current-color-row">
      <span class="label">현재 색상:</span>
      <span id="current-color-swatch" class="swatch"></span>
    </div>

    <div class="palette" id="palette" role="group" aria-label="색상 팔레트"></div>

    <div class="custom-color-row">
      <label for="custom-color" class="label">사용자 지정 색상:</label>
      <input type="color" id="custom-color" value="#000000">
    </div>

    <div class="controls">
      <button id="clear-btn" class="control-btn" type="button">전체 지우기</button>
      <button id="save-btn" class="control-btn primary" type="button">PNG로 저장</button>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
