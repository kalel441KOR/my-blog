<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2048</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-container">
    <!-- 헤더: 제목 + 점수 -->
    <div class="game-header">
      <h1 class="game-title">2048</h1>
      <div class="scores">
        <div class="score-box">
          <div class="score-label">Score</div>
          <div class="score-value" id="score-value">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">Best</div>
          <div class="score-value" id="best-value">0</div>
        </div>
      </div>
    </div>

    <!-- 새 게임 버튼 -->
    <div class="game-controls">
      <button class="btn" id="new-game-btn">새 게임</button>
    </div>

    <!-- 게임 격자 -->
    <div class="grid-wrapper">
      <div id="grid-container"></div>

      <!-- 게임 오버 오버레이 -->
      <div class="overlay" id="game-over-overlay">
        <div class="overlay-message">게임 오버!</div>
        <div class="overlay-buttons">
          <button class="btn" id="retry-btn">다시 시작</button>
        </div>
      </div>

      <!-- 승리 오버레이 -->
      <div class="overlay" id="win-overlay">
        <div class="overlay-message">축하합니다!</div>
        <div class="overlay-buttons">
          <button class="btn" id="keep-playing-btn">계속하기</button>
          <button class="btn" id="win-new-game-btn">새 게임</button>
        </div>
      </div>
    </div>

    <!-- 안내 텍스트 -->
    <p class="game-hint">방향키 또는 스와이프로 조작</p>
  </div>

  <script src="game.js"></script>
  <script src="ui.js"></script>
</body>
</html>
