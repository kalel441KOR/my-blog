<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="site-title">My Blog</a>
      <button class="theme-toggle" aria-label="테마 전환">🌙</button>
    </div>
  </header>
  <main class="container">
    <section class="app-section">
      <h2 class="section-title">미니 웹앱</h2>
      <div class="app-grid">
        <a href="app/2048/index.html" class="app-card">
          <div class="app-card-preview">
            <iframe src="app/2048/index.html" tabindex="-1" loading="lazy"></iframe>
          </div>
          <div class="app-card-info">
            <h3>2048</h3>
            <p>타일을 밀어 같은 숫자끼리 합치는 퍼즐 게임</p>
          </div>
        </a>
        <a href="app/pixel-art-editor/index.html" class="app-card">
          <div class="app-card-preview">
            <iframe src="app/pixel-art-editor/index.html" tabindex="-1" loading="lazy"></iframe>
          </div>
          <div class="app-card-info">
            <h3>픽셀 아트 에디터</h3>
            <p>16x16 격자에 도트를 찍어 그림을 그리고 PNG로 저장하는 미니 에디터</p>
          </div>
        </a>
      </div>
    </section>
    <h2 class="section-title">글 목록</h2>
    <ul id="posts" class="post-list">
      <li class="loading">글을 불러오는 중...</li>
    </ul>
  </main>
  <footer>
    <div class="container">&copy; 2026 My Blog</div>
  </footer>
  <script src="js/main.js"></script>
</body>
</html>
